name: Feature request
description: Suggest a maintainer workflow, rule, adapter, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: workflow
    attributes:
      label: Maintainer workflow
      description: What recurring intake problem would this help with?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: Describe the rule, CLI command, Action behavior, MCP tool, or documentation change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What manual workflow or other tool are you using now?
    validations:
      required: false
  - type: checkboxes
    id: fit
    attributes:
      label: Scope check
      options:
        - label: This can be explained and tested with fixtures or public repository data.
          required: true
        - label: This does not require posting tokens or private repository contents.
          required: true
